kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: greeting-console
spec:
  nodeSelector: {}
  strategy:
    type: Docker
  source:
    type: Git
    git:
      uri: 'https://github.com/ravindra-be2004/do400-greeting-console'
      ref: main
  output:
    to:
      kind: DockerImage
      name: quay.io/ravindra_be2004/console1
    pushSecret:
      name: quay-credentials
